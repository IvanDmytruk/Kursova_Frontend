<!-- Frontend/pages/match-details -->
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деталі матчу - SportHub</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Стилі -->
    <link rel="stylesheet" href="../style/main.css">
    <link rel="stylesheet" href="../style/components.css">
    <link rel="stylesheet" href="../style/responsive.css">
    <link rel="stylesheet" href="../style/matches.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="../index.html">
            <i class="fas fa-trophy me-2"></i> SportHub
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="../index.html"><i class="fas fa-home me-1"></i>Головна</a></li>
                <li class="nav-item"><a class="nav-link active" href="saved.html"><i class="fas fa-bookmark me-1"></i>Обране</a></li>
                <li class="nav-item"><a class="nav-link" href="tournaments.html"><i class="fas fa-trophy me-1"></i>Турніри</a></li>
                <li class="nav-item"><a class="nav-link" href="teams.html"><i class="fas fa-users me-1"></i>Команди</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle me-1"></i> Профіль
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="profile.html"><i class="fas fa-id-card me-2"></i>Мій профіль</a></li>
                        <li><a class="dropdown-item" href="profile.html?tab=stats"><i class="fas fa-chart-line me-2"></i>Моя статистика</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" id="logoutLink"><i class="fas fa-sign-out-alt me-2"></i>Вихід</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4">
    <div id="loadingSpinner" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Завантаження...</span>
        </div>
    </div>

    <div id="matchContent" style="display: none;">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-12">
                        <div class="text-center mb-3">
                            <span class="badge bg-secondary" id="tournamentName"></span>
                            <span class="badge ms-2" id="matchStatus"></span>
                        </div>
                        <div class="row align-items-center">
                            <div class="col-4 text-center">
                                <h4 class="mt-2" id="homeTeamName"></h4>
                                <div class="team-formation" id="homeFormation"></div>
                            </div>
                            <div class="col-4">
                                <div class="score-card">
                                    <span id="homeScore">0</span> : <span id="awayScore">0</span>
                                </div>
                                <div class="text-center text-muted" id="matchDateTime"></div>
                                <div class="text-center text-muted small" id="matchVenue"></div>
                                <div class="text-center mt-2">
                                    <button class="btn btn-outline-warning btn-sm" id="saveMatchBtn">
                                        <i class="far fa-bookmark"></i> Зберегти матч
                                    </button>
                                </div>
                            </div>
                            <div class="col-4 text-center">
                                <h4 class="mt-2" id="awayTeamName"></h4>
                                <div class="team-formation" id="awayFormation"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs mb-3" id="matchTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#lineupTab">
                    <i class="fas fa-users me-1"></i> Склади
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#statsTab">
                    <i class="fas fa-chart-bar me-1"></i> Статистика
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#eventsTab">
                    <i class="fas fa-list me-1"></i> Події
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="lineupTab">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card shadow-sm">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0" id="homeTeamLineupName"></h5>
                                <small class="d-block" id="homeTeamCoach"></small>
                            </div>
                            <div class="card-body">
                                <h6 class="text-success"><i class="fas fa-star"></i> Основний склад</h6>
                                <div id="homeStarters" class="list-group mb-3"></div>
                                <h6 class="text-warning"><i class="fas fa-chair"></i> Запасні</h6>
                                <div id="homeBench" class="list-group"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card shadow-sm">
                            <div class="card-header bg-danger text-white">
                                <h5 class="mb-0" id="awayTeamLineupName"></h5>
                                <small class="d-block" id="awayTeamCoach"></small>
                            </div>
                            <div class="card-body">
                                <h6 class="text-success"><i class="fas fa-star"></i> Основний склад</h6>
                                <div id="awayStarters" class="list-group mb-3"></div>
                                <h6 class="text-warning"><i class="fas fa-chair"></i> Запасні</h6>
                                <div id="awayBench" class="list-group"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="statsTab">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div id="matchStats"></div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="eventsTab">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div id="matchEvents" class="event-timeline"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Модальні вікна -->
<div class="modal fade" id="lineupModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-edit"></i> Редагувати склад</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <h5 id="modalHomeTeam"></h5>
                        <div id="modalHomePlayers" class="player-selection"></div>
                    </div>
                    <div class="col-md-6">
                        <h5 id="modalAwayTeam"></h5>
                        <div id="modalAwayPlayers" class="player-selection"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                <button type="button" class="btn btn-primary" id="saveLineupBtn">Зберегти склад</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="statsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-chart-line"></i> Редагувати статистику</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="statsForm">
                    <div class="row">
                        <div class="col-md-6">
                            <h5 id="statsHomeTeam"></h5>
                            <div class="mb-3">
                                <label class="form-label">Володіння м'ячем (%)</label>
                                <input type="number" class="form-control" id="homePossession">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Удари (всього)</label>
                                <input type="number" class="form-control" id="homeShots">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h5 id="statsAwayTeam"></h5>
                            <div class="mb-3">
                                <label class="form-label">Володіння м'ячем (%)</label>
                                <input type="number" class="form-control" id="awayPossession">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Удари (всього)</label>
                                <input type="number" class="form-control" id="awayShots">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                <button type="button" class="btn btn-primary" id="saveStatsBtn">Зберегти</button>
            </div>
        </div>
    </div>
</div>

<div class="admin-actions" id="adminActions" style="display: none;">
    <button class="btn btn-primary mb-2" id="editLineupBtn"><i class="fas fa-users"></i></button>
    <button class="btn btn-success mb-2" id="editStatsBtn"><i class="fas fa-chart-line"></i></button>
    <button class="btn btn-info mb-2" id="editTacticsBtn"><i class="fas fa-chalkboard"></i></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Cкрипти -->
<script src="../logic/api/config.js"></script>
<script src="../logic/api/matchesApi.js"></script>
<script src="../logic/api/teamsApi.js"></script>
<script src="../logic/api/tournamentsApi.js"></script>
<script src="../logic/api/usersApi.js"></script>
<script src="../logic/utils/dateFormatter.js"></script>
<script src="../logic/utils/notifications.js"></script>
<script src="../logic/pages/matchDetails.js"></script>
<script src="../logic/api/savedItemsApi.js"></script>

<script>
    document.getElementById('logoutLink')?.addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.removeItem('currentUser');
        window.location.href = '../index.html';
    });
</script>
</body>
</html>
