<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деталі турніру - SportHub</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style/main.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="/index.html">
            <i class="fas fa-trophy me-2"></i> SportHub
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/index.html">Головна</a></li>
                <li class="nav-item"><a class="nav-link" href="saved.html">Обране</a></li>
                <li class="nav-item"><a class="nav-link active" href="tournaments.html">Турніри</a></li>
                <li class="nav-item"><a class="nav-link" href="teams.html">Команди</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4">
    <div id="loadingSpinner" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Завантаження...</span>
        </div>
    </div>

    <div id="tournamentContent" style="display: none;">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h2 id="tournamentName">Завантаження...</h2>
                        <p id="tournamentDescription" class="text-muted"></p>
                    </div>
                    <button class="btn btn-outline-warning btn-sm" id="saveTournamentBtn">
                        <i class="far fa-bookmark"></i> Зберегти турнір
                    </button>
                    <button class="btn btn-outline-danger btn-sm" id="registerForTournament">
                        <i class="">Зареєструватися</i>
                    </button>
                </div>
                <div class="row mt-3">
                    <div class="col-md-3">
                        <strong>Тип турніру:</strong> <span id="tournamentType"></span>
                    </div>
                    <div class="col-md-3">
                        <strong>Формат:</strong> <span id="tournamentFormat"></span>
                    </div>
                    <div class="col-md-3">
                        <strong>Призовий фонд:</strong> <span id="prizeFund"></span> грн
                    </div>
                    <div class="col-md-3">
                        <strong>Дата початку:</strong> <span id="startDate"></span>
                    </div>
                </div>
                <div class="row mt-2" id="participantsInfoContainer"></div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Учасники турніру</h5>
            </div>
            <div class="card-body">
                <div id="participantsList" class="row">
                    <div class="col-12 text-center text-muted py-4">
                        <i class="fas fa-users fa-2x mb-2"></i>
                        <p>Завантаження учасників...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="/logic/api/config.js"></script>
<script src="/logic/api/tournamentsApi.js"></script>
<script src="/logic/api/savedItemsApi.js"></script>
<script src="/logic/pages/tournamentDetails.js"></script>

</body>
</html>
